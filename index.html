<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Mate - Enhanced Todo List</title>
  <link rel="stylesheet" href="TodoList.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"> -->
</head>
<body>

  <div class="app" id="app">
    <header>
      <div class="brand">
        <div class="logo" aria-hidden="true">
          <img src="./Todo.png" alt="">
        </div>
        <div class="brand-text">
          <h1>Task Mate</h1>
          <div class="muted">Stay organized and get things done. <br>
            Fast. Pretty. Persistent(<span class="kbd">localStorage</span>)
          </div>
        </div>
        <div class="theme-toggle">
          <button id="themeToggle" class="btn secondary" title="Toggle theme">
            <span class="theme-icon"><i class="bi bi-moon-fill"></i></span>
          </button>
        </div>
      </div>


      <div class="controls">
        <input type="text" id="newTitle" placeholder="Write a task (press Enter/Button)..." autocomplete="off"/>
        <button id="addBtn" class="btn mobile-only"><i class="bi bi-plus-lg me-1"></i> Add Task</button>
        <input type="text" id="search" placeholder="Search todos..." autocomplete="off"/>
        <div class="row" role="group" aria-label="Filters">
          <button class="chip active" data-filter="all"><i class="bi bi-list-ul me-1"></i> All</button>
          <button class="chip" data-filter="active"><i class="bi bi-circle me-1"></i> Active</button>
          <button class="chip" data-filter="completed"><i class="bi bi-check2-circle me-1"></i> Completed</button>
        </div>
      </div>
    </header>

    <main>
      <ul id="list"></ul>
      <div id="empty" class="empty hide"><i class="bi bi-clipboard2-plus empty-icon"></i> No tasks yet. Add your first to-do</div>
    </main>

    <footer>
      <div id="count">0 items</div>
      <div class="row">
        <button id="clearCompleted" class="btn secondary"><i class="bi bi-trash3 me-1 d-none d-sm-inline"></i> Clear Completed</button>
        <button id="export" class="btn"><i class="bi bi-download me-1 d-none d-sm-inline"></i> Export</button>
        <button id="import" class="btn secondary"><i class="bi bi-upload me-1 d-none d-sm-inline"></i> Import</button>
        <button id="wipe" class="btn danger"><i class="bi bi-x-octagon me-1 d-none d-sm-inline"></i> Wipe All</button>
      </div>
    </footer>
  </div>

  <dialog id="editDialog">
    <div class="dlg-body">
      <h5><i class="bi bi-pencil-square me-2"></i> Edit Task</h5>
      <div class="dlg-row">
        <input type="text" id="editTitle" placeholder="Title"/>
        <textarea id="editNotes" placeholder="Notes (optional)"></textarea>
      </div>
    </div>
    <div class="dlg-actions">
      <button id="editCancel" class="btn secondary">Cancel</button>
      <button id="editSave" class="btn">Save</button>
    </div>
  </dialog>

  <dialog id="confirmDialog">
    <div class="dlg-body">
      <h5 id="confirmTitle">Confirm</h5>
      <p id="confirmText">Are you sure?</p>
    </div>
    <div class="dlg-actions">
      <button id="confirmCancel" class="btn secondary"><i class="bi bi-x-circle"></i> Cancel</button>
      <button id="confirmOk" class="btn danger"><i class="bi bi-check2-circle"></i> Yes</button>
    </div>
  </dialog>

  <div id="toast-container" class="toast-container"></div>

  <script type="module" src="TodoList.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
